[pytest]
minversion = 9.0

testpaths =
    tests

pythonpath =
    src

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

addopts =
    -v
    -ra
    --strict-config
    --strict-markers

markers =
    unit: Fast isolated tests that do not access external files or services.
    integration: Tests that verify cooperation between application components and external files.