<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabOps AI Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #07111f;
      --surface: #0d1b2d;
      --surface-raised: #13243a;
      --border: #233a55;
      --text: #ecf4ff;
      --muted: #93a9c2;
      --accent: #5da9ff;
      --healthy: #38d996;
      --warning: #ffc857;
      --critical: #ff647c;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(
          circle at top right,
          rgba(44, 122, 255, 0.18),
          transparent 35%
        ),
        var(--background);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1400px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border: 1px solid rgba(93, 169, 255, 0.45);
      border-radius: 15px;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      background: rgba(93, 169, 255, 0.12);
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .api-state {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(13, 27, 45, 0.8);
    }

    .state-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
    }

    .state-dot.online {
      background: var(--healthy);
      box-shadow: 0 0 16px var(--healthy);
    }

    .button {
      padding: 10px 16px;
      border: 1px solid rgba(93, 169, 255, 0.45);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      background: rgba(93, 169, 255, 0.17);
    }

    .button:hover {
      background: rgba(93, 169, 255, 0.28);
    }

    .button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .card,
    .panel {
      border: 1px solid var(--border);
      background: rgba(13, 27, 45, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .card {
      padding: 20px;
      border-radius: 16px;
    }

    .card-label {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-value {
      overflow: hidden;
      font-size: 28px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .panel {
      overflow: hidden;
      border-radius: 18px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px 120px auto;
      gap: 12px;
      align-items: end;
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 9px;
      outline: none;
      color: var(--text);
      background: var(--background);
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 18px;
      border-bottom: 1px solid rgba(35, 58, 85, 0.7);
      text-align: left;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(7, 17, 31, 0.48);
    }

    tbody tr:hover {
      background: rgba(93, 169, 255, 0.06);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
    }

    .badge.HEALTHY {
      color: var(--healthy);
      background: rgba(56, 217, 150, 0.12);
    }

    .badge.WARNING {
      color: var(--warning);
      background: rgba(255, 200, 87, 0.12);
    }

    .badge.CRITICAL {
      color: var(--critical);
      background: rgba(255, 100, 124, 0.13);
    }

    .empty,
    .error {
      padding: 36px;
      text-align: center;
      color: var(--muted);
    }

    .error {
      color: var(--critical);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    a {
      color: var(--accent);
    }

    @media (max-width: 900px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 22px, 1400px);
        padding-top: 20px;
      }

      .cards,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .header-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <div class="logo">L</div>
        <div>
          <h1>LabOps AI</h1>
          <p class="subtitle">
            Infrastructure monitoring and diagnostics
          </p>
        </div>
      </div>

      <div class="header-actions">
        <div class="api-state">
          <span id="api-dot" class="state-dot"></span>
          <span id="api-label">Checking API</span>
        </div>
        <button id="refresh" class="button" type="button">
          Refresh
        </button>
      </div>
    </header>

    <section class="cards" aria-label="Monitoring summary">
      <article class="card">
        <div class="card-label">Loaded Runs</div>
        <div id="total-runs" class="card-value">—</div>
      </article>

      <article class="card">
        <div class="card-label">Latest Status</div>
        <div id="latest-status" class="card-value">—</div>
      </article>

      <article class="card">
        <div class="card-label">Active Incidents</div>
        <div id="active-incidents" class="card-value">—</div>
      </article>

      <article class="card">
        <div class="card-label">Latest Host</div>
        <div id="latest-host" class="card-value">—</div>
      </article>
    </section>

    <section class="panel">
      <form id="filters" class="toolbar">
        <label>
          Host name
          <input
            id="host-filter"
            name="host_name"
            maxlength="255"
            placeholder="All hosts"
          >
        </label>

        <label>
          Status
          <select id="status-filter" name="status">
            <option value="">All statuses</option>
            <option value="HEALTHY">Healthy</option>
            <option value="WARNING">Warning</option>
            <option value="CRITICAL">Critical</option>
          </select>
        </label>

        <label>
          Runs
          <select id="limit-filter" name="limit">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>

        <button class="button" type="submit">
          Apply filters
        </button>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Run</th>
              <th>Generated</th>
              <th>Host</th>
              <th>Overall</th>
              <th>System</th>
              <th>Network</th>
              <th>Services</th>
              <th>Processes</th>
              <th>Logs</th>
              <th>Incidents</th>
            </tr>
          </thead>
          <tbody id="run-table"></tbody>
        </table>

        <div id="message" class="empty">
          Loading monitoring history…
        </div>
      </div>
    </section>

    <div class="footer">
      <span id="updated-at">Not updated yet</span>
      <span>
        <a href="/docs">API documentation</a>
      </span>
    </div>
  </main>

  <script>
    const elements = {
      apiDot: document.querySelector("#api-dot"),
      apiLabel: document.querySelector("#api-label"),
      refresh: document.querySelector("#refresh"),
      filters: document.querySelector("#filters"),
      host: document.querySelector("#host-filter"),
      status: document.querySelector("#status-filter"),
      limit: document.querySelector("#limit-filter"),
      totalRuns: document.querySelector("#total-runs"),
      latestStatus: document.querySelector("#latest-status"),
      activeIncidents: document.querySelector(
        "#active-incidents"
      ),
      latestHost: document.querySelector("#latest-host"),
      table: document.querySelector("#run-table"),
      message: document.querySelector("#message"),
      updatedAt: document.querySelector("#updated-at")
    };

    function createCell(value) {
      const cell = document.createElement("td");
      cell.textContent = value;
      return cell;
    }

    function createStatusCell(status) {
      const cell = document.createElement("td");
      const badge = document.createElement("span");
      badge.className = `badge ${status}`;
      badge.textContent = status;
      cell.appendChild(badge);
      return cell;
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat(
        undefined,
        {
          dateStyle: "medium",
          timeStyle: "medium"
        }
      ).format(new Date(value));
    }

    function buildRunsUrl() {
      const parameters = new URLSearchParams({
        limit: elements.limit.value
      });

      const host = elements.host.value.trim();

      if (host) {
        parameters.set("host_name", host);
      }

      if (elements.status.value) {
        parameters.set("status", elements.status.value);
      }

      return `/api/v1/runs?${parameters.toString()}`;
    }

    async function fetchJson(url) {
      const response = await fetch(url, {
        headers: { Accept: "application/json" }
      });

      if (!response.ok) {
        throw new Error(
          `Request failed with HTTP ${response.status}`
        );
      }

      return response.json();
    }

    function renderRuns(runs) {
      elements.table.replaceChildren();
      elements.message.hidden = runs.length > 0;

      if (!runs.length) {
        elements.message.className = "empty";
        elements.message.textContent =
          "No monitoring runs match the selected filters.";
        elements.totalRuns.textContent = "0";
        elements.latestStatus.textContent = "—";
        elements.activeIncidents.textContent = "0";
        elements.latestHost.textContent = "—";
        return;
      }

      const latest = runs[0];

      elements.totalRuns.textContent = String(runs.length);
      elements.latestStatus.textContent =
        latest.overall_status;
      elements.activeIncidents.textContent = String(
        latest.active_incident_count
      );
      elements.latestHost.textContent = latest.host_name;

      for (const run of runs) {
        const row = document.createElement("tr");

        row.append(
          createCell(`#${run.run_id}`),
          createCell(formatDate(run.generated_at)),
          createCell(run.host_name),
          createStatusCell(run.overall_status),
          createStatusCell(run.system_status),
          createStatusCell(run.network_status),
          createStatusCell(run.service_status),
          createStatusCell(run.process_status),
          createStatusCell(run.log_status),
          createCell(String(run.incident_count))
        );

        elements.table.appendChild(row);
      }
    }

    async function refreshDashboard() {
      elements.refresh.disabled = true;
      elements.message.hidden = false;
      elements.message.className = "empty";
      elements.message.textContent =
        "Loading monitoring history…";

      try {
        const [health, runs] = await Promise.all([
          fetchJson("/api/v1/health"),
          fetchJson(buildRunsUrl())
        ]);

        elements.apiDot.classList.add("online");
        elements.apiLabel.textContent =
          `${health.status} · API ${health.version}`;

        renderRuns(runs);

        elements.updatedAt.textContent =
          `Updated ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        elements.apiDot.classList.remove("online");
        elements.apiLabel.textContent = "API unavailable";
        elements.table.replaceChildren();
        elements.message.hidden = false;
        elements.message.className = "error";
        elements.message.textContent = error.message;
      } finally {
        elements.refresh.disabled = false;
      }
    }

    elements.refresh.addEventListener(
      "click",
      refreshDashboard
    );

    elements.filters.addEventListener(
      "submit",
      event => {
        event.preventDefault();
        refreshDashboard();
      }
    );

    refreshDashboard();
    window.setInterval(refreshDashboard, 60000);
  </script>
</body>
</html>
